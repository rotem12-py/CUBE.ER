<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBE.ER</title>
    {% block styles %}
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="../static/custom.css">
        {{ bootstrap.load_css() }}
    {% endblock %}

</head>
<body style="background-color: #243642;">
  <nav class="navbar navbar-expand-lg bg-dark" id="head-navbar">
    <div class="container-fluid">
      <a class="navbar-brand text-light">CUBE.ER</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          {% if not current_user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link active text-light" aria-current="page" href="{{ url_for('login') }}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="{{ url_for('register') }}">Register</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link text-light" href="{{ url_for('logout') }}">Logout</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}
  {% endblock %}
